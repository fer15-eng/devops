<!DOCTYPE html>
<html>
<head>
  <title>Colorful Interactive Website</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      margin-top: 50px;
      transition: background-color 0.5s ease;
    }
    h1 {
      color: #333;
    }
    .color-btn {
      padding: 12px 24px;
      margin: 10px;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      cursor: pointer;
      color: white;
      transition: transform 0.3s ease, box-shadow 0.3s ease;
    }
    .color-btn:hover {
      transform: scale(1.1);
      box-shadow: 0 0 15px rgba(0,0,0,0.3);
    }
    #message {
      margin-top: 30px;
      font-size: 20px;
      font-weight: bold;
      color: darkblue;
    }
  </style>
</head>
<body>
  <h1>🌈 Colorful Interactive Page 🌈</h1>
  <p>Click a button to change the background!</p>

  <!-- Color buttons -->
  <button class="color-btn" style="background:red;" onclick="changeColor('red')">Red</button>
  <button class="color-btn" style="background:orange;" onclick="changeColor('orange')">Orange</button>
  <button class="color-btn" style="background:yellow; color:black;" onclick="changeColor('yellow')">Yellow</button>
  <button class="color-btn" style="background:green;" onclick="changeColor('green')">Green</button>
  <button class="color-btn" style="background:blue;" onclick="changeColor('blue')">Blue</button>
  <button class="color-btn" style="background:purple;" onclick="changeColor('purple')">Purple</button>

  <div id="message"></div>

  <script>
    function changeColor(color) {
      document.body.style.backgroundColor = color;
      document.getElementById("message").textContent = 
        "You chose " + color.toUpperCase() + "!";
    }
  </script>
</body>
</html>
